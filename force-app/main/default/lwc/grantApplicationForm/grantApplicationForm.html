<template>
    <lightning-card icon-name="standard:opportunity">
        <h1 slot="title" class="slds-card__header-title">
            <span class="slds-text-heading_small">Maplewood County Grant Application</span>
        </h1>

        <!-- Custom Step Indicator -->
        <div class="step-indicator" role="navigation" aria-label="Application progress">
            <ol class="step-list">
                <li class={step1Class} data-step="section1">
                    <span class="step-number">1</span>
                    <span class="step-label">Organization Info</span>
                </li>
                <li class="step-connector" aria-hidden="true">
                    <div class={connector1Class}></div>
                </li>
                <li class={step2Class} data-step="section2">
                    <span class="step-number">2</span>
                    <span class="step-label">Project Details</span>
                </li>
                <li class="step-connector" aria-hidden="true">
                    <div class={connector2Class}></div>
                </li>
                <li class={step3Class} data-step="review">
                    <span class="step-number">3</span>
                    <span class="step-label">Review &amp; Submit</span>
                </li>
            </ol>
        </div>

        <template lwc:if={errorBanner}>
            <div class="error-banner slds-m-horizontal_medium slds-m-top_small" role="alert">
                <lightning-icon icon-name="utility:error" variant="inverse" size="x-small" alternative-text="Error" class="slds-m-right_x-small"></lightning-icon>
                {errorBanner}
            </div>
        </template>

        <template lwc:if={successBanner}>
            <div class="success-banner slds-m-horizontal_medium slds-m-top_small" role="alert">
                <lightning-icon icon-name="utility:success" variant="inverse" size="x-small" alternative-text="Success" class="slds-m-right_x-small"></lightning-icon>
                {successBanner}
            </div>
        </template>

        <div class="slds-grid slds-gutters slds-wrap slds-p-around_medium">
            <!-- Form Column -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12">

                <!-- ===== SECTION 1: Organization Information ===== -->
                <template lwc:if={isSection1}>
                    <div class="slds-section slds-is-open">
                        <h2 class="slds-text-heading_medium slds-m-bottom_medium">
                            Section 1: Organization Information
                        </h2>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Organization Name"
                                    value={organizationName}
                                    data-field="organizationName"
                                    required
                                    min-length="2"
                                    max-length="100"
                                    onchange={handleFieldChange}
                                    field-level-help="Legal name of the organization"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="EIN / Tax ID"
                                    value={ein}
                                    data-field="ein"
                                    required
                                    pattern="^\d{2}-\d{7}$"
                                    message-when-pattern-mismatch="EIN must be in format XX-XXXXXXX (e.g. 52-1234567)"
                                    placeholder="XX-XXXXXXX"
                                    onchange={handleFieldChange}
                                    field-level-help="IRS Employer Identification Number"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-combobox
                                    label="Organization Type"
                                    value={organizationType}
                                    data-field="organizationType"
                                    options={organizationTypeOptions}
                                    required
                                    placeholder="Select organization type"
                                    onchange={handleFieldChange}
                                    field-level-help="Organization classification"
                                ></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Year Founded"
                                    value={yearFounded}
                                    data-field="yearFounded"
                                    required
                                    pattern="^(18|19|20)\d{2}$"
                                    message-when-pattern-mismatch="Enter a valid 4-digit year (e.g. 1998)"
                                    placeholder="e.g. 1998"
                                    max-length="4"
                                    onchange={handleFieldChange}
                                    field-level-help="Year the organization was established"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Annual Operating Budget"
                                    type="number"
                                    value={annualBudget}
                                    data-field="annualBudget"
                                    required
                                    min="0"
                                    max="100000000"
                                    step="0.01"
                                    formatter="currency"
                                    onchange={handleFieldChange}
                                    field-level-help="Total annual budget"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Number of Full-Time Employees"
                                    type="number"
                                    value={numEmployees}
                                    data-field="numEmployees"
                                    required
                                    min="0"
                                    max="9999"
                                    onchange={handleFieldChange}
                                    field-level-help="Full-time staff count"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Primary Contact Name"
                                    value={contactName}
                                    data-field="contactName"
                                    required
                                    min-length="2"
                                    max-length="50"
                                    onchange={handleFieldChange}
                                    field-level-help="Primary contact first and last name"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Primary Contact Email"
                                    type="email"
                                    value={contactEmail}
                                    data-field="contactEmail"
                                    required
                                    onchange={handleFieldChange}
                                    field-level-help="Correspondence email"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Primary Contact Phone"
                                    type="tel"
                                    value={contactPhone}
                                    data-field="contactPhone"
                                    required
                                    onchange={handleFieldChange}
                                    field-level-help="Contact phone number"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-m-bottom_small">
                            <lightning-textarea
                                label="Organization Address"
                                value={organizationAddress}
                                data-field="organizationAddress"
                                required
                                max-length="500"
                                onchange={handleFieldChange}
                                field-level-help="Physical address"
                            ></lightning-textarea>
                        </div>

                        <div class="slds-m-bottom_small">
                            <lightning-textarea
                                label="Mission Statement"
                                value={missionStatement}
                                data-field="missionStatement"
                                required
                                min-length="20"
                                max-length="500"
                                onchange={handleFieldChange}
                                field-level-help="Organization's mission (20-500 characters)"
                            ></lightning-textarea>
                        </div>

                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button
                                label="Next: Project Details"
                                variant="brand"
                                icon-name="utility:forward"
                                icon-position="right"
                                onclick={handleNext}
                            ></lightning-button>
                        </div>
                    </div>
                </template>

                <!-- ===== SECTION 2: Project Details ===== -->
                <template lwc:if={isSection2}>
                    <div class="slds-section slds-is-open">
                        <h2 class="slds-text-heading_medium slds-m-bottom_medium">
                            Section 2: Project Details
                        </h2>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Project Title"
                                    value={projectTitle}
                                    data-field="projectTitle"
                                    required
                                    min-length="5"
                                    max-length="100"
                                    onchange={handleFieldChange}
                                    field-level-help="Descriptive project title"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-combobox
                                    label="Project Category"
                                    value={projectCategory}
                                    data-field="projectCategory"
                                    options={projectCategoryOptions}
                                    required
                                    placeholder="Select a category"
                                    onchange={handleFieldChange}
                                    field-level-help="Best-fit category"
                                ></lightning-combobox>
                            </div>
                        </div>

                        <div class="slds-m-bottom_small">
                            <lightning-textarea
                                label="Project Description"
                                value={projectDescription}
                                data-field="projectDescription"
                                required
                                min-length="50"
                                max-length="2000"
                                onchange={handleFieldChange}
                                field-level-help="Goals, activities, and expected outcomes (50-2000 characters)"
                            ></lightning-textarea>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Target Population Served"
                                    value={targetPopulation}
                                    data-field="targetPopulation"
                                    required
                                    min-length="5"
                                    max-length="200"
                                    onchange={handleFieldChange}
                                    field-level-help="Who benefits from this project?"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Estimated Beneficiaries"
                                    type="number"
                                    value={numBeneficiaries}
                                    data-field="numBeneficiaries"
                                    required
                                    min="1"
                                    max="1000000"
                                    onchange={handleFieldChange}
                                    field-level-help="Number of direct beneficiaries"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Total Project Cost"
                                    type="number"
                                    value={totalProjectCost}
                                    data-field="totalProjectCost"
                                    required
                                    min="100"
                                    max="10000000"
                                    step="0.01"
                                    formatter="currency"
                                    onchange={handleFieldChange}
                                    field-level-help="Total project cost"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Amount Requested"
                                    type="number"
                                    value={amountRequested}
                                    data-field="amountRequested"
                                    required
                                    min="100"
                                    max="50000"
                                    step="0.01"
                                    formatter="currency"
                                    onchange={handleFieldChange}
                                    field-level-help="Grant amount requested (max $50,000)"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Project Start Date"
                                    type="date"
                                    value={projectStartDate}
                                    data-field="projectStartDate"
                                    required
                                    onchange={handleFieldChange}
                                    field-level-help="Must be at least 30 days in the future"
                                ></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <lightning-input
                                    label="Project End Date"
                                    type="date"
                                    value={projectEndDate}
                                    data-field="projectEndDate"
                                    required
                                    onchange={handleFieldChange}
                                    field-level-help="Must be after start date, within 24 months"
                                ></lightning-input>
                            </div>
                        </div>

                        <div class="slds-m-bottom_small">
                            <lightning-input
                                label="Previously Funded by Maplewood County?"
                                type="checkbox"
                                checked={previouslyFunded}
                                data-field="previouslyFunded"
                                onchange={handleFieldChange}
                            ></lightning-input>
                        </div>

                        <!-- File Upload -->
                        <div class="slds-box slds-m-bottom_medium slds-theme_shade">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Supporting Document</h3>
                            <p class="slds-text-body_small slds-m-bottom_small">
                                Upload a supporting document (PDF, JPG, or PNG, max 5 MB).
                            </p>
                            <input
                                type="file"
                                accept=".pdf,.jpg,.jpeg,.png"
                                data-id="fileInput"
                                onchange={handleFileChange}
                                class="file-input"
                                aria-label="Upload supporting document"
                            />
                            <template lwc:if={uploadedFileName}>
                                <div class="slds-m-top_small slds-text-color_success">
                                    <lightning-icon icon-name="utility:check" size="x-small" variant="success" alternative-text="File attached"></lightning-icon>
                                    <span class="slds-m-left_x-small">{uploadedFileName}</span>
                                </div>
                            </template>
                        </div>

                        <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                            <lightning-button
                                label="Back: Organization Info"
                                variant="neutral"
                                icon-name="utility:back"
                                onclick={handleBack}
                            ></lightning-button>
                            <lightning-button
                                label="Review & Submit"
                                variant="brand"
                                icon-name="utility:preview"
                                icon-position="right"
                                onclick={handleReview}
                            ></lightning-button>
                        </div>
                    </div>
                </template>

                <!-- ===== REVIEW STEP ===== -->
                <template lwc:if={isReview}>
                    <div class="slds-section slds-is-open">
                        <h2 class="slds-text-heading_medium slds-m-bottom_medium">
                            Review Your Application
                        </h2>

                        <!-- Eligibility Warning -->
                        <template lwc:if={showEligibilityWarning}>
                            <div class="warning-banner" role="alert">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:warning" variant="warning" size="small" alternative-text="Warning"></lightning-icon>
                                    <span class="slds-m-left_small">
                                        <strong>Eligibility Warning:</strong> Your application does not pass all eligibility rules ({eligibilitySummary}).
                                        You may still submit, but the reviewer will make the final determination.
                                    </span>
                                </div>
                            </div>
                        </template>

                        <!-- Organization Information Review -->
                        <div class="review-section slds-box slds-m-bottom_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small slds-border_bottom slds-p-bottom_small">
                                Organization Information
                            </h3>
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Organization Name:</span>
                                    <span class="slds-m-left_x-small">{organizationName}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">EIN / Tax ID:</span>
                                    <span class="slds-m-left_x-small">{ein}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Organization Type:</span>
                                    <span class="slds-m-left_x-small">{organizationType}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Year Founded:</span>
                                    <span class="slds-m-left_x-small">{yearFounded}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Annual Operating Budget:</span>
                                    <span class="slds-m-left_x-small">{formattedAnnualBudget}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Full-Time Employees:</span>
                                    <span class="slds-m-left_x-small">{numEmployees}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Contact Name:</span>
                                    <span class="slds-m-left_x-small">{contactName}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Contact Email:</span>
                                    <span class="slds-m-left_x-small">{contactEmail}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Contact Phone:</span>
                                    <span class="slds-m-left_x-small">{contactPhone}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-1 review-field">
                                    <span class="review-label">Organization Address:</span>
                                    <span class="slds-m-left_x-small">{organizationAddress}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-1 review-field">
                                    <span class="review-label">Mission Statement:</span>
                                    <p class="slds-m-top_xx-small slds-m-left_small">{missionStatement}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Project Details Review -->
                        <div class="review-section slds-box slds-m-bottom_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small slds-border_bottom slds-p-bottom_small">
                                Project Details
                            </h3>
                            <div class="slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Project Title:</span>
                                    <span class="slds-m-left_x-small">{projectTitle}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Project Category:</span>
                                    <span class="slds-m-left_x-small">{projectCategory}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-1 review-field">
                                    <span class="review-label">Project Description:</span>
                                    <p class="slds-m-top_xx-small slds-m-left_small">{projectDescription}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Target Population:</span>
                                    <span class="slds-m-left_x-small">{targetPopulation}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Estimated Beneficiaries:</span>
                                    <span class="slds-m-left_x-small">{numBeneficiaries}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Total Project Cost:</span>
                                    <span class="slds-m-left_x-small">{formattedTotalProjectCost}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Amount Requested:</span>
                                    <span class="slds-m-left_x-small">{formattedAmountRequested}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Project Start Date:</span>
                                    <span class="slds-m-left_x-small">{projectStartDate}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Project End Date:</span>
                                    <span class="slds-m-left_x-small">{projectEndDate}</span>
                                </div>
                                <div class="slds-col slds-size_1-of-2 review-field">
                                    <span class="review-label">Previously Funded:</span>
                                    <span class="slds-m-left_x-small">{previouslyFundedLabel}</span>
                                </div>
                                <template lwc:if={uploadedFileName}>
                                    <div class="slds-col slds-size_1-of-2 review-field">
                                        <span class="review-label">Attached Document:</span>
                                        <span class="slds-m-left_x-small">{uploadedFileName}</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Eligibility Summary in Review -->
                        <div class="review-section slds-box slds-m-bottom_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small slds-border_bottom slds-p-bottom_small">
                                Eligibility Summary
                            </h3>
                            <template for:each={eligibilityRules} for:item="rule">
                                <div key={rule.ruleNumber} class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                                    <lightning-icon
                                        icon-name={rule.iconName}
                                        size="x-small"
                                        class={rule.iconClass}
                                        alternative-text={rule.statusText}
                                    ></lightning-icon>
                                    <span class="slds-m-left_x-small">{rule.ruleName}</span>
                                    <span class="slds-m-left_small slds-text-body_small slds-text-color_weak">— {rule.message}</span>
                                </div>
                            </template>
                            <div class="slds-m-top_small slds-border_top slds-p-top_small">
                                <strong>{eligibilitySummary}</strong>
                            </div>
                        </div>

                        <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                            <lightning-button
                                label="Edit Application"
                                variant="neutral"
                                icon-name="utility:edit"
                                onclick={handleEdit}
                            ></lightning-button>
                            <lightning-button
                                label="Submit Application"
                                variant="brand"
                                icon-name="utility:upload"
                                icon-position="right"
                                onclick={handleSubmit}
                                disabled={isLoading}
                            ></lightning-button>
                        </div>
                    </div>
                </template>
            </div>

            <!-- ===== ELIGIBILITY PANEL (Right Sidebar) ===== -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                <div class="slds-box slds-theme_shade eligibility-panel" role="complementary" aria-label="Eligibility Check">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">
                        <lightning-icon icon-name="utility:rules" size="x-small" class="slds-m-right_x-small" alternative-text="Eligibility rules"></lightning-icon>
                        Eligibility Check
                    </h2>

                    <template lwc:if={hasEligibilityRules}>
                        <template for:each={eligibilityRules} for:item="rule">
                            <div key={rule.ruleNumber} class="slds-m-bottom_x-small eligibility-rule">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon
                                        icon-name={rule.iconName}
                                        size="x-small"
                                        class={rule.iconClass}
                                        alternative-text={rule.statusText}
                                    ></lightning-icon>
                                    <span class="slds-m-left_x-small slds-text-body_regular">
                                        {rule.ruleName}
                                    </span>
                                </div>
                                <template lwc:if={rule.message}>
                                    <p class="slds-text-body_small slds-m-left_large slds-text-color_weak slds-m-top_xxx-small">
                                        {rule.message}
                                    </p>
                                </template>
                            </div>
                        </template>
                    </template>

                    <template lwc:if={noEligibilityRules}>
                        <p class="slds-text-body_small slds-text-color_weak">
                            Fill in the form fields to see real-time eligibility feedback.
                        </p>
                    </template>

                    <div class="slds-m-top_small slds-border_top slds-p-top_small">
                        <strong>{eligibilitySummary}</strong>
                    </div>

                    <template lwc:if={isFullyEligible}>
                        <div class="slds-m-top_small">
                            <span class="slds-badge slds-badge_success eligibility-badge-pass">
                                <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse" alternative-text="Eligible" class="slds-m-right_xx-small"></lightning-icon>
                                Fully Eligible
                            </span>
                        </div>
                    </template>
                    <template lwc:if={isPartiallyEligible}>
                        <div class="slds-m-top_small">
                            <span class="slds-badge eligibility-badge-warn">
                                <lightning-icon icon-name="utility:warning" size="xx-small" alternative-text="Partially eligible" class="slds-m-right_xx-small"></lightning-icon>
                                Not Fully Eligible
                            </span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Loading spinner overlay -->
        <template lwc:if={isLoading}>
            <div class="spinner-overlay">
                <lightning-spinner alternative-text="Processing your application" size="medium"></lightning-spinner>
            </div>
        </template>
    </lightning-card>

    <!-- Screen reader live region for eligibility updates -->
    <div class="slds-assistive-text" role="status" aria-live="polite" aria-atomic="true">
        {screenReaderMessage}
    </div>
</template>
