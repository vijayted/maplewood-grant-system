<template>
    <div class="login-page">

        <!-- Left Panel: Grant Info -->
        <div class="info-panel">
            <div class="info-content">
                <div class="brand-logo">
                    <span class="logo-icon">M</span>
                    <span class="logo-text">APLEWOOD</span>
                </div>

                <h1 class="info-heading">Community Development<br/><span class="heading-accent">Grant Program</span></h1>

                <p class="info-desc">Maplewood County invests $2 million annually in local nonprofits building stronger communities through impactful projects.</p>

                <div class="info-features">
                    <div class="feature-item">
                        <span class="feature-icon">&#9878;</span>
                        <div class="feature-text">
                            <span class="feature-title">Up to $50,000</span>
                            <span class="feature-sub">Per grant award for eligible nonprofits</span>
                        </div>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">&#10003;</span>
                        <div class="feature-text">
                            <span class="feature-title">Real\u2011Time Eligibility</span>
                            <span class="feature-sub">Know if you qualify as you fill the application</span>
                        </div>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">&#128202;</span>
                        <div class="feature-text">
                            <span class="feature-title">Transparent Awards</span>
                            <span class="feature-sub">5\u2011factor scoring matrix determines funding</span>
                        </div>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">&#128172;</span>
                        <div class="feature-text">
                            <span class="feature-title">Track Your Status</span>
                            <span class="feature-sub">Dashboard shows progress from submission to award</span>
                        </div>
                    </div>
                </div>

                <div class="info-stats">
                    <div class="stat-block">
                        <span class="stat-number">$2M</span>
                        <span class="stat-label">Annual Fund</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-block">
                        <span class="stat-number">250K</span>
                        <span class="stat-label">Residents Served</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-block">
                        <span class="stat-number">6</span>
                        <span class="stat-label">Grant Categories</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Login Form -->
        <div class="login-panel">
            <div class="login-content">
                <div class="login-card">
                    <h2 class="card-title">Welcome Back</h2>
                    <p class="card-subtitle">Sign in to manage your grant applications</p>

                    <template lwc:if={errorMessage}>
                        <div class="error-banner" role="alert">
                            <span class="error-text">{errorMessage}</span>
                        </div>
                    </template>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            placeholder="you@maplewood.gov"
                            value={email}
                            onchange={handleEmailChange}
                            onkeydown={handleKeyDown}
                            autocomplete="email"
                        />
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Enter your password"
                            value={password}
                            onchange={handlePasswordChange}
                            onkeydown={handleKeyDown}
                            autocomplete="current-password"
                        />
                    </div>

                    <button class="btn-login" onclick={handleLogin} disabled={isLoading}>
                        <template lwc:if={isLoading}>Signing in...</template>
                        <template lwc:else>Sign In</template>
                    </button>

                    <div class="links-row">
                        <a href="/grants/ForgotPassword" class="link">Forgot password?</a>
                        <a href="/grants/SelfRegister" class="link">Create an account</a>
                    </div>
                </div>

                <div class="footer-text">
                    Need help? Contact grants@maplewood.gov
                </div>
            </div>
        </div>

    </div>
</template>
